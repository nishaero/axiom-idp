name: Dependency Review

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.22'
  NODE_VERSION: '20'

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Verify Go module hygiene
        run: |
          go mod download
          go mod verify
          go mod tidy -diff

      - name: Verify frontend lockfile hygiene
        working-directory: web
        run: npm ci --ignore-scripts

      - name: Summarize dependency review
        run: |
          echo "Dependency graph review is not enabled on this repository."
          echo "Using manifest hygiene checks as the practical equivalent until GitHub dependency graph support is enabled."
