name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  GO_VERSION: '1.22'
  NODE_VERSION: '18'

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: /home/nishaero/ai-workspace/axiom-idp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Go dependencies
        run: go mod download

      - name: Install Node dependencies
        run: |
          cd web
          npm ci --ignore-scripts
          npm install @vitest/coverage-v8

      - name: Run Go tests with race detection
        run: |
          go test -v -race -timeout 5m -coverprofile=coverage.out -covermode=atomic ./...

      - name: Run Go vet
        run: |
          go vet ./...
          echo "✅ Go vet completed"

      - name: Run Go linters
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=10m --out-format=tab

      - name: Run frontend tests
        run: |
          cd web
          npm test -- --run

      - name: Upload test coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.out
          flags: unittests
          fail_ci_if_error: false
          name: go-tests
          yml: ./codecov.yml

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage.out
            ./
          if-no-files-found: ignore

  build:
    name: Build Backend & Frontend
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build backend binary
        run: |
          make build

      - name: Upload backend binary
        uses: actions/upload-artifact@v4
        with:
          name: axiom-server-linux-amd64
          path: bin/axiom-server
          retention-days: 7

  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: axiom-idp-web
          path: dist/
          retention-days: 7

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        run: |
          docker build -f Dockerfile \
            --build-arg GO_VERSION=${{ env.GO_VERSION }} \
            -t axiom-idp/backend:${{ github.sha }} \
            .

      - name: Build frontend Docker image
        run: |
          docker build -f web/Dockerfile \
            -t axiom-idp/frontend:${{ github.sha }} \
            web/

      - name: Build docker-compose image
        run: |
          docker build -f Dockerfile \
            -t axiom-idp/full:${{ github.sha }} \
            .

      - name: Save Docker images
        uses: actions/upload-artifact@v4
        with:
          name: axiom-docker-images
          path: |
            /var/lib/docker/
            ~/.docker/
          if-no-files-found: ignore
          retention-days: 1

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: /home/nishaero/ai-workspace/axiom-idp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          make build
          cd web && npm ci

      - name: Start backend
        run: |
          nohup ./bin/axiom-server > /tmp/backend.log 2>&1 &
          sleep 3

      - name: Start frontend dev server
        run: |
          cd web
          npm run dev > /tmp/frontend.log 2>&1 &
          sleep 5

      - name: Run health checks
        run: |
          curl -f http://localhost:8080/health || exit 1
          curl -f http://localhost:3000 || exit 1

      - name: Run API tests
        run: |
          curl -f http://localhost:8080/health
          curl -f http://localhost:8080/api/v1/catalog/services
          curl -f http://localhost:8080/api/v1/auth/login

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            /tmp/backend.log
            /tmp/frontend.log
          if-no-files-found: ignore

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, frontend-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: true
          tag_name: v${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
