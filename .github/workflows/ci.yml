name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.24.9'
  NODE_VERSION: '24'

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Run Go tests
        run: go test -v -race -timeout 10m ./...

      - name: Run Go vet
        run: go vet ./... 2>&1 | tee /tmp/go-vet.txt

      - name: Build backend binary
        run: make build

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Remove generated TypeScript artifacts
        run: find web/src -type f \( -name '*.js' -o -name '*.js.map' -o -name '*.d.ts' -o -name '*.d.ts.map' \) -delete

      - name: Run type check
        working-directory: web
        run: npm run type-check

      - name: Run lint
        working-directory: web
        run: npm run lint

      - name: Run tests
        working-directory: web
        run: npm test -- --run

      - name: Build frontend
        working-directory: web
        run: npm run build

  image-build:
    name: Build Container Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build --build-arg VERSION=ci --build-arg BUILD_TIME=ci -t axiom-idp:ci .

  compose-smoke:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    needs: [backend, frontend, image-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Compose deployment
        run: ./scripts/validate-docker.sh
