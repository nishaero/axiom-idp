name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: '1.22'
  NODE_VERSION: '20'
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  preflight:
    name: Release Preflight
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: |
          npm ci
          npm install --no-save jsdom @testing-library/user-event

      - name: Remove generated TypeScript artifacts
        run: find web/src -type f \( -name '*.js' -o -name '*.js.map' -o -name '*.d.ts' -o -name '*.d.ts.map' \) -delete

      - name: Backend tests
        run: go test ./...

      - name: Frontend lint and typecheck
        working-directory: web
        run: |
          npm run type-check
          npm run lint

      - name: Frontend tests and build
        working-directory: web
        run: |
          npm test -- --run
          npm run build

  build-matrix:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
        exclude:
          - os: windows
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p /tmp/dist
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} CGO_ENABLED=0 \
            go build -trimpath \
              -ldflags "-s -w -X main.Version=${{ github.ref_name }} -X main.BuildTime=$(date -u '+%Y-%m-%d_%H:%M:%SZ')" \
              -o /tmp/dist/axiom-server-${{ matrix.os }}-${{ matrix.arch }} \
              ./cmd/axiom-server

      - name: Create tarball
        run: |
          tar -czf /tmp/dist/axiom-server-${{ matrix.os }}-${{ matrix.arch }}.tar.gz \
            -C /tmp/dist axiom-server-${{ matrix.os }}-${{ matrix.arch }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: axiom-server-${{ matrix.os }}-${{ matrix.arch }}
          path: /tmp/dist/axiom-server-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          retention-days: 14

  docker-build:
    name: Build and Push GHCR Image
    runs-on: ubuntu-latest
    needs: preflight

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.ref_name }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Axiom IDP
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_TIME=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate published image can be pulled
        run: docker pull ${{ env.IMAGE_NAME }}:latest

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-matrix, docker-build]

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: axiom-server-*
          path: /tmp/releases
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/releases/*
          generate_release_notes: true
          draft: false
          prerelease: false
