name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  actions: read

env:
  GO_VERSION: '1.24.9'
  NODE_VERSION: '24'
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  preflight:
    name: Release Preflight
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Validate semantic version tag
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use semantic versioning like v1.2.3"
            exit 1
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Remove generated TypeScript artifacts
        run: find web/src -type f \( -name '*.js' -o -name '*.js.map' -o -name '*.d.ts' -o -name '*.d.ts.map' \) -delete

      - name: Backend tests
        run: go test ./...

      - name: Frontend lint and typecheck
        working-directory: web
        run: |
          npm run type-check
          npm run lint

      - name: Frontend tests and build
        working-directory: web
        run: |
          npm test -- --run
          npm run build

  build-matrix:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
        exclude:
          - os: windows
            arch: arm64

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p /tmp/dist
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} CGO_ENABLED=0 \
            go build -trimpath \
              -ldflags "-s -w -X main.Version=${{ github.ref_name }} -X main.BuildTime=$(date -u '+%Y-%m-%d_%H:%M:%SZ')" \
              -o /tmp/dist/axiom-server-${{ matrix.os }}-${{ matrix.arch }} \
              ./cmd/axiom-server

      - name: Create tarball
        run: |
          tar -czf /tmp/dist/axiom-server-${{ matrix.os }}-${{ matrix.arch }}.tar.gz \
            -C /tmp/dist axiom-server-${{ matrix.os }}-${{ matrix.arch }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: axiom-server-${{ matrix.os }}-${{ matrix.arch }}
          path: /tmp/dist/axiom-server-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          retention-days: 14

  docker-build:
    name: Build and Push GHCR Image
    runs-on: ubuntu-latest
    needs: preflight

    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image_ref: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.ref_name }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Axiom IDP
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=PolyForm-Noncommercial-1.0.0
            org.opencontainers.image.description=AI-native internal developer platform with GitOps delivery, release intelligence, and compliance-aware operations.

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_TIME=${{ github.run_id }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate published image can be pulled
        run: docker pull ${{ env.IMAGE_NAME }}:latest

      - name: Install cosign
        uses: sigstore/cosign-installer@v4

      - name: Sign published image
        run: cosign sign --yes ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Generate image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: /tmp/axiom-release-image-sbom.spdx.json

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Verify image signature
        run: cosign verify ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Verify image attestation
        run: gh attestation verify oci://${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }} --repo ${{ github.repository }}

      - name: Upload release SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: axiom-release-image-sbom
          path: /tmp/axiom-release-image-sbom.spdx.json
          retention-days: 30

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-matrix, docker-build]

    steps:
      - uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: axiom-*
          path: /tmp/releases
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/releases/*
          generate_release_notes: true
          draft: false
          prerelease: false
