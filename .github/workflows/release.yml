name: Release

on:
  push:
    tags:
      - 'v*'

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: axiom-idp

jobs:
  lint:
    name: Pre-release Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Lint Go code
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=10m

      - name: Lint frontend
        run: |
          cd web
          npm run lint
          npm run tsc

      - name: Check documentation
        run: |
          npx remark docs/*.md docs/**/*.md

  build-matrix:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p /tmp/dist
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} CGO_ENABLED=0 \
            go build \
              -ldflags "-s -w -X main.Version=${{ github.ref_name }} -X main.BuildTime=$(date -u '+%Y-%m-%d_%H:%M:%S%Z') -X main.GitCommit=${{ github.sha }}" \
              -o /tmp/dist/axiom-server-${{ matrix.os }}-${{ matrix.arch }} \
              ./cmd/axiom-server

      - name: Create tarball
        run: |
          tar -czf /tmp/dist/axiom-server-${{ matrix.os }}-${{ matrix.arch }}.tar.gz \
            -C /tmp/dist axiom-server-${{ matrix.os }}-${{ matrix.arch }}

      - name: Upload release artifacts
        uses: svenstaro/upload-release-action@v2
        with:
          file: /tmp/dist/axiom-server-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          asset_name: axiom-server-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          tag: ${{ github.ref_name }}
          file_glob: true

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          version=$(echo ${{ github.ref_name }} | sed 's/v//')
          echo "version=${version}" >> $GITHUB_OUTPUT
          echo "tag=ghcr.io/${{ github.repository }}/axiom:${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "latest=ghcr.io/${{ github.repository }}/axiom:latest" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.latest }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            GO_VERSION=1.22

      - name: Build and push full-stack image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.tag }}-full
            ${{ steps.meta.outputs.latest }}-full
          platforms: linux/amd64,linux/arm64

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}/axiom:${{ github.ref_name }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-matrix, docker-build]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: axiom-server-*
          path: /tmp/releases
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            /tmp/releases/*
          body: |
            ## Axiom IDP Release ${{ github.ref_name }}

            ### Features

            - MCP Protocol integration
            - Service catalog with intelligent search
            - AI-assisted debugging
            - RBAC-based access control
            - Comprehensive security scanning

            ### Security

            - BSI C5 compliant security standards
            - Container vulnerability scanning (Trivy)
            - Go static analysis (govulncheck, gosec)
            - Secret detection (TruffleHog)
            - Dependency vulnerability checks

            ### License

            Apache License 2.0

            ### Credits

            Copyright © 2026 Nishant Ravi <nishaero@gmail.com>

            ### Links

            - [Documentation](https://axiom-idp.github.io)
            - [Security Policy](SECURITY.md)
            - [Contributing](CONTRIBUTING.md)

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [create-release]
    if: github.event_name == 'release' && github.event.action == 'created'

    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Axiom IDP ${{ github.ref_name }} has been released!",
              "blocks": [
                {
                  "type": "section",
                  "text": "{% if github.event_name == 'release' && github.event.action == 'created' %}\n  New release: ${{ github.ref_name }}\n  Download: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}\n{% endif %}",
                  "accessory_type": "image"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
