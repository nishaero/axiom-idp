name: Deploy Validation

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-validation-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  docker-compose:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v5

      - name: Validate Docker deployment
        run: ./scripts/validate-docker.sh

  minikube:
    name: Minikube Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v5

      - name: Start Minikube
        uses: medyagh/setup-minikube@v0.0.21
        with:
          driver: docker

      - name: Validate Minikube deployment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/validate-minikube.sh
