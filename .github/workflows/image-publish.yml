name: Image Publish Validation

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  actions: read

concurrency:
  group: image-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  publish:
    name: Image Publish Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Axiom IDP
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_TIME=${{ github.run_id }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pull published image
        run: docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v4

      - name: Sign published validation image
        run: cosign sign --yes ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Generate validation image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: /tmp/axiom-image-sbom.spdx.json

      - name: Attest validation image provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Verify validation image signature
        run: cosign verify ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Verify validation image attestation
        run: gh attestation verify oci://${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }} --repo ${{ github.repository }}

      - name: Upload validation SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: axiom-image-sbom-${{ github.sha }}
          path: /tmp/axiom-image-sbom.spdx.json
          retention-days: 14

      - name: Smoke test published image
        run: |
          docker run -d --rm --name axiom-image-smoke -p 18080:8080 ${{ env.IMAGE_NAME }}:${{ github.sha }}
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/health >/dev/null; then
              docker stop axiom-image-smoke >/dev/null
              exit 0
            fi
            sleep 2
          done
          docker logs axiom-image-smoke
          docker stop axiom-image-smoke >/dev/null
          exit 1
