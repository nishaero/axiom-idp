name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0'

jobs:
  gosec:
    name: GoSec
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run GoSec
        uses: securego/gosec@master
        with:
          args: -no-fail -fmt sarif -out gosec-result.sarif ./...
      
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: gosec-result.sarif
          wait-for-processing: true

  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -t axiom:${{ github.sha }} .
      
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: axiom:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-result.sarif'
      
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: trivy-result.sarif

  secrets:
    name: Detect Secrets
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Detect secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'
      
      - name: Check dependencies
        run: |
          go list -json -m all | nancy sleuth || true
          npm audit --audit-level=moderate || true
