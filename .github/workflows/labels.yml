name: Sync Labels

on:
  push:
    branches: [main]
    paths:
      - ".github/labels.json"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const labels = JSON.parse(fs.readFileSync('.github/labels.json', 'utf8'))
            const owner = context.repo.owner
            const repo = context.repo.repo
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name })
                await github.rest.issues.updateLabel({ owner, repo, name: label.name, color: label.color, description: label.description })
              } catch (error) {
                await github.rest.issues.createLabel({ owner, repo, name: label.name, color: label.color, description: label.description })
              }
            }
