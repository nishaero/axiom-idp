name: Auto Tag Release

on:
  workflow_run:
    workflows:
      - CI
      - Code Quality Gate
      - Security Scan
      - Image Publish Validation
      - Deploy Validation
    types:
      - completed

permissions:
  contents: write
  actions: write

concurrency:
  group: auto-tag-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  tag:
    name: Create Semver Tag
    if: >-
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Evaluate workflow set for merged main commit
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.payload.workflow_run.head_sha;
            const required = [
              "CI",
              "Code Quality Gate",
              "Security Scan",
              "Image Publish Validation",
              "Deploy Validation",
            ];

            const response = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              head_sha: sha,
              per_page: 100,
            });
            const runs = response.data.workflow_runs || [];

            const latestByName = new Map();
            for (const run of runs) {
              if (!run || !run.name) {
                continue;
              }
              if (run.head_branch !== "main") {
                continue;
              }
              const existing = latestByName.get(run.name);
              if (!existing || new Date(run.created_at) > new Date(existing.created_at)) {
                latestByName.set(run.name, run);
              }
            }

            const missing = [];
            const failed = [];
            for (const name of required) {
              const run = latestByName.get(name);
              if (!run) {
                missing.push(name);
                continue;
              }
              if (run.status !== "completed" || run.conclusion !== "success") {
                failed.push(`${name}:${run.status}/${run.conclusion}`);
              }
            }

            core.info(`Required workflows: ${required.join(", ")}`);
            core.info(`Missing workflows: ${missing.join(", ") || "none"}`);
            core.info(`Non-success workflows: ${failed.join(", ") || "none"}`);

            const matchingTags = await github.paginate(
              github.rest.repos.listTags,
              { owner, repo, per_page: 100 },
              (response) => response.data,
            );
            const existingTag = matchingTags.find((tag) => tag.commit.sha === sha);

            core.setOutput("sha", sha);
            core.setOutput("ready", missing.length === 0 && failed.length === 0 ? "true" : "false");
            core.setOutput("existing_tag", existingTag ? existingTag.name : "");

      - name: Stop when release tag already exists
        if: steps.gate.outputs.existing_tag != ''
        run: echo "Commit already tagged with ${{ steps.gate.outputs.existing_tag }}"

      - name: Stop when workflow set is incomplete
        if: steps.gate.outputs.ready != 'true' && steps.gate.outputs.existing_tag == ''
        run: |
          echo "Not all required workflows have completed successfully for ${{ steps.gate.outputs.sha }}."
          exit 0

      - name: Checkout main
        if: steps.gate.outputs.ready == 'true' && steps.gate.outputs.existing_tag == ''
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Calculate next semantic version tag
        if: steps.gate.outputs.ready == 'true' && steps.gate.outputs.existing_tag == ''
        id: version
        shell: bash
        run: |
          latest_tag=$(git tag --list 'v*.*.*' --sort=-version:refname | head -n 1)
          if [[ -z "${latest_tag}" ]]; then
            next_tag="v1.0.0"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<<"${version}"
            next_tag="v${major}.${minor}.$((patch + 1))"
          fi
          echo "next_tag=${next_tag}" >>"${GITHUB_OUTPUT}"

      - name: Create and push release tag
        if: steps.gate.outputs.ready == 'true' && steps.gate.outputs.existing_tag == ''
        env:
          TAG_NAME: ${{ steps.version.outputs.next_tag }}
          TARGET_SHA: ${{ steps.gate.outputs.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG_NAME}" "${TARGET_SHA}" -m "Release ${TAG_NAME}"
          git push origin "${TAG_NAME}"

      - name: Dispatch release workflow for new tag
        if: steps.gate.outputs.ready == 'true' && steps.gate.outputs.existing_tag == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.version.outputs.next_tag }}
        run: gh workflow run release.yml --ref main -f tag_name="${TAG_NAME}"
