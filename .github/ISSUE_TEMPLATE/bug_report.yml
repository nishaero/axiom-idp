name: Bug Report
description: Report a defect in Axiom IDP
title: "[Bug]: "
labels:
  - bug
  - needs-triage
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem and expected behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Provide exact steps to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Explain operational, security, or user impact.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - backend
        - frontend
        - ci-cd
        - security
        - documentation
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste sanitized logs, traces, or screenshots if available.
