apiVersion: v1
kind: Namespace
metadata:
  name: axiom
  labels:
    app.kubernetes.io/name: axiom-idp
    app.kubernetes.io/part-of: axiom-idp
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: axiom-config
  namespace: axiom
data:
  AXIOM_HOST: "0.0.0.0"
  AXIOM_PORT: "8081"
  AXIOM_ENV: "production"
  AXIOM_LOG_LEVEL: "info"
  AXIOM_DB_DRIVER: "sqlite3"
  AXIOM_DB_URL: "file:/var/lib/axiom/axiom.db"
  AXIOM_RATE_LIMIT_REQUESTS: "1000"
  AXIOM_RATE_LIMIT_WINDOW: "1m"
  AXIOM_AI_BACKEND: "local"
  AXIOM_AI_TIMEOUT: "90s"
  AXIOM_AI_MAX_TOKENS: "768"
---
apiVersion: v1
kind: Secret
metadata:
  name: axiom-secrets
  namespace: axiom
type: Opaque
stringData:
  AXIOM_SESSION_SECRET: "REPLACE_WITH_A_LONG_RANDOM_SECRET"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: axiom-data
  namespace: axiom
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: axiom-server
  namespace: axiom
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: axiom-server
  namespace: axiom
  labels:
    app.kubernetes.io/name: axiom-server
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: axiom-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: axiom-server
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: axiom-server
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: axiom-server
          image: ghcr.io/axiom-idp/axiom:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: axiom-config
            - secretRef:
                name: axiom-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /var/lib/axiom
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: data
          persistentVolumeClaim:
            claimName: axiom-data
        - name: nginx-cache
          emptyDir:
            sizeLimit: 128Mi
        - name: nginx-run
          emptyDir:
            medium: Memory
            sizeLimit: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: axiom-server
  namespace: axiom
spec:
  selector:
    app.kubernetes.io/name: axiom-server
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: axiom-server
  namespace: axiom
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: axiom-server
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: axiom-server
  namespace: axiom
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: axiom-server
