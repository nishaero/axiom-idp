apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-demo-web
  namespace: argocd-demo
  labels:
    app.kubernetes.io/name: argocd-demo-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-demo-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-demo-web
    spec:
      automountServiceAccountToken: false
      containers:
        - name: web
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
