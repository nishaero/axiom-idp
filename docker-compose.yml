services:
  axiom:
    image: ${AXIOM_IMAGE:-ghcr.io/axiom-idp/axiom:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GO_VERSION: ${GO_VERSION:-1.24.9}
        NODE_VERSION: ${NODE_VERSION:-24}
    ports:
      - "8080:8080"
    environment:
      AXIOM_HOST: 0.0.0.0
      AXIOM_PORT: 8081
      AXIOM_ENV: ${AXIOM_ENV:-production}
      AXIOM_LOG_LEVEL: ${AXIOM_LOG_LEVEL:-info}
      AXIOM_DB_DRIVER: sqlite3
      AXIOM_DB_URL: file:/var/lib/axiom/axiom.db
      AXIOM_SESSION_SECRET: ${AXIOM_SESSION_SECRET:?AXIOM_SESSION_SECRET must be set}
      AXIOM_RATE_LIMIT_REQUESTS: ${AXIOM_RATE_LIMIT_REQUESTS:-1000}
      AXIOM_RATE_LIMIT_WINDOW: ${AXIOM_RATE_LIMIT_WINDOW:-1m}
      AXIOM_AI_BACKEND: ${AXIOM_AI_BACKEND:-ollama}
      AXIOM_AI_BASE_URL: ${AXIOM_AI_BASE_URL:-http://host.docker.internal:11434}
      AXIOM_AI_MODEL: ${AXIOM_AI_MODEL:-qwen3.5:9b}
      AXIOM_AI_TIMEOUT: ${AXIOM_AI_TIMEOUT:-90s}
      AXIOM_AI_MAX_TOKENS: ${AXIOM_AI_MAX_TOKENS:-768}
    volumes:
      - axiom-data:/var/lib/axiom
    extra_hosts:
      - "host.docker.internal:host-gateway"
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  axiom-data:
